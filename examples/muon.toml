# μon configuration example
# Copy to ~/.config/muon/config.toml
#
# Dynamic Provider Model: configure LLM providers in [[providers]] and search
# providers in [[search.providers]]. Agent `provider` strings look up the
# `name` field in the [[providers]] list. API key values support ${ENV_VAR}
# expansion at runtime (e.g. "${OPENCODE_GO_API_KEY}").

[[providers]]
name = "opencode-go"
base_url = "https://api.opencode.dev/v1"
api_key = "${OPENCODE_GO_API_KEY}"

[[providers.models]]
name = "glm-5.2"
description = "Full GLM 5.2, 1M context"

[[providers.models]]
name = "glm-5.2-short"
description = "GLM 5.2 Short, 200K context"

[[providers]]
name = "NeuralWatt"
base_url = "https://api.neuralwatt.com/v1"
api_key = "${NEURALWATT_API_KEY}"

[[providers]]
name = "cline"
base_url = "https://api.cline.bot/v1"
api_key = "${CLINEPASS_API_KEY}"

[[search.providers]]
name = "tavily"
type = "tavily"
api_key = "${TAVILY_API_KEY}"
max_results = 10

[[search.providers]]
name = "brave"
type = "brave"
api_key = "${BRAVE_API_KEY}"

[search.papers]
arxiv_enabled = true

[agents]

# Intent classifier — first stage, classifies query type and depth.
[agents.intent_classifier]
model = "glm-5.2-short"
provider = "opencode-go"
timeout_sec = 90
verbose = false

# Clarifier — interactive HITL disambiguation before research.
[agents.clarifier]
model = "glm-5.2"
provider = "opencode-go"
max_turns = 3
plan_approval = true
max_iterations = 10

# Shallow researcher — single-pass synthesis of search results.
[agents.shallow_researcher]
model = "glm-5.2"
provider = "NeuralWatt"
max_llm_turns = 10
max_tool_iters = 5

# Deep researcher — orchestrator drives planning + research via delegate tools.
[agents.deep_researcher]
iterations = 8
max_retries = 3
planner_max_cycles = 3
orchestrator_max_tool_calls = 8
planner_max_tool_calls = 4
researcher_max_tool_calls = 10
citation_verify = true

[agents.deep_researcher.orchestrator]
model = "glm-5.2"
provider = "opencode-go"

[agents.deep_researcher.planner]
model = "glm-5.2-short"
provider = "NeuralWatt"

[agents.deep_researcher.researcher]
model = "glm-5.2-flex"
provider = "NeuralWatt"

# Legacy [tools] keys are auto-migrated into [[providers]] on load.
# New keys should be added in the Providers tab of the TUI.
[tools]
opencode_go_api_key = ""
neuralwatt_api_key = ""
clinepass_api_key = ""
brave_api_key = ""
searxng_url = "https://searxng.local"
searxng_api_key = ""
semantic_scholar_api_key = ""
arxiv_enabled = true

# Data source toggles.
[data_sources]
web_search = true
paper_search = true
enterprise_systems = false
knowledge_layer_rag = true

# Display preferences.
[display]
visual_theme = "Tokyo Night"
font_size = "Medium 14px"

# Advanced pipeline and storage settings.
# NOTE: max_clarifier_turns, max_plan_iterations, and plan_approval below are
# mirrored from [agents.clarifier] on save for backwards compatibility. Edit
# [agents.clarifier] for runtime configuration.
[advanced]
max_researcher_loops = 2
max_clarifier_turns = 3
max_plan_iterations = 10
max_shallow_turns = 10
max_deep_turns = 25
escalate_agent = true
plan_approval = true
compaction_threshold = 0.80
agent_preamble = "You are μon, a deep research agent. Be extremely precise, fact-check everything, compile structured summaries, and cite sources in full formatting."
agents_dir = "~/.config/muon/agents"
session_db_path = "~/.local/share/muon/sessions.db"
rag_db_path = "~/.local/share/muon/rag.db"
max_search_items = 15
embedding_model = "Xenova/bge-small-en-v1.5"
rag_top_k = 5
similarity_threshold = 0.70
