# μon configuration example (full reference)
# First launch scaffolds a minimal config (no providers) from muon.scaffold.toml.
# Copy blocks from this file into ~/.config/muon/config.toml, or use Settings.
#
# Dynamic Provider Model: configure LLM providers in [[providers]] and search
# providers in [[search.providers]]. Agent `provider` strings look up the
# `name` field in the [[providers]] list. API key values support ${ENV_VAR}
# expansion at runtime (e.g. "${DEEPSEEK_API_KEY}") — only after the env var is set.

[[providers]]
name = "Ollama"
base_url = "http://localhost:11434/v1"
api_key = ""

[[providers.models]]
name = "Gemma 4 E2B"
description = "Gemma 4 E2B, local via Ollama"

[[providers.models]]
name = "Gemma 4 12B"
description = "Gemma 4 12B, local via Ollama"

[[providers]]
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"

[[providers.models]]
name = "DeepSeek V4 Flash"
description = "DeepSeek V4 Flash, fast inference"

[[providers.models]]
name = "DeepSeek V4 Pro"
description = "DeepSeek V4 Pro, deep reasoning"

[[providers]]
name = "MiniMax"
base_url = "https://api.minimax.chat/v1"
api_key = "${MINIMAX_API_KEY}"

[[providers.models]]
name = "MiniMax M3"
description = "MiniMax M3, balanced performance"

[[search.providers]]
name = "tavily"
type = "tavily"
api_key = "${TAVILY_API_KEY}"
max_results = 10

[[search.providers]]
name = "brave"
type = "brave"
api_key = "${BRAVE_API_KEY}"

[search.papers]
arxiv_enabled = true

[agents]

# Pipeline knobs only. Model/provider/timeout live in agents/*.md frontmatter
# (edit via Settings → Agents or the markdown files directly).
[agents.clarifier]
max_turns = 3
plan_approval = true
max_iterations = 10

[agents.shallow_researcher]
max_llm_turns = 10
max_tool_iters = 5

# Deep researcher — orchestrator drives planning + research via delegate tools.
# iterations = ReAct cycle budget (loop owner).
# orchestrator_max_tool_calls = per-cycle multi-tool turns (keep low, ~1–2).
# researcher_max_tool_calls = managed multi-turn for search → fetch → synthesize.
[agents.deep_researcher]
iterations = 8
max_retries = 3
planner_max_cycles = 3
orchestrator_max_tool_calls = 2
planner_max_tool_calls = 4
researcher_max_tool_calls = 4
citation_verify = true

# Data source toggles.
[data_sources]
web_search = true
paper_search = true
knowledge_layer_rag = false

# Display preferences.
[display]
visual_theme = "Tokyo Night"
font_size = "Medium 14px"

# Advanced pipeline and storage settings.
[advanced]
max_researcher_loops = 2
max_shallow_turns = 10
max_deep_turns = 25
escalate_agent = true
compaction_threshold = 0.80
agent_preamble = "You are μon, a deep research agent. Be extremely precise, fact-check everything, compile structured summaries, and cite sources in full formatting."
agents_dir = "~/.config/muon/agents"
session_db_path = "~/.local/share/muon/sessions.db"
rag_db_path = "~/.local/share/muon/rag.db"
max_search_items = 15
embedding_model = "BGESmallENV15"
rag_top_k = 5
similarity_threshold = 0.70

# Obsidian export target. Leave vault_path empty to fall back to the
# MUON_OBSIDIAN_VAULT environment variable.
[obsidian]
vault_path = ""

# Observability. `debug = true` never truncates OTEL span attributes (full
# payloads). When false (default), attributes larger than 16k chars may be
# capped for export performance. Live TUI feed is always truncated; agent
# return values (e.g. researcher salvage → orchestrator) are never truncated.
[observability]
debug = false

# LangSmith / OpenTelemetry export. Leave api_key empty to disable tracing;
# the ${LANGSMITH_API_KEY} env var is also honored if set.
[observability.langsmith]
api_key = ""
project = "default"
endpoint = "https://api.smith.langchain.com/otel/v1/traces"
service_name = "muon"
console = false
batch = true
batch_delay_ms = 1000
